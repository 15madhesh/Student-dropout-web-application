<!DOCTYPE html>
<html>
<head>
    <title>Dropout Analyzer</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav>
        {% if session.get('user') %}
            <a href="{{ url_for('dashboard') }}">Dashboard</a>
            <a href="{{ url_for('stats') }}">Statistics</a>
            <a href="{{ url_for('upload') }}">Upload</a>
            <a href="{{ url_for('manual_entry') }}">Manual Entry</a>
            <a href="{{ url_for('update_marks') }}">Update University Marks</a>
            <a href="{{ url_for('all_students') }}">Student Details</a>
            <a href="{{ url_for('dropout_students') }}">Dropout Students</a>
            <a href="{{ url_for('about') }}">About</a>
            <a href="{{ url_for('contact') }}">Contact</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        {% else %}
            <a href="{{ url_for('login') }}">Login</a>
            <a href="{{ url_for('signup') }}">Signup</a>
        {% endif %}
    </nav>
    {% block content %}{% endblock %}
    
    {% if session.get('user') %}
    <!-- Global Chatbase AI Chatbot Widget -->
    <script>
        (function(){if(!window.chatbase||window.chatbase("getState")!=="initialized"){window.chatbase=(...arguments)=>{if(!window.chatbase.q){window.chatbase.q=[]}window.chatbase.q.push(arguments)};window.chatbase=new Proxy(window.chatbase,{get(target,prop){if(prop==="q"){return target.q}return(...args)=>target(prop,...args)}})}const onLoad=function(){const script=document.createElement("script");script.src="https://www.chatbase.co/embed.min.js";script.id="GPxk8n5Uv-kiINDcIjU0w";script.domain="www.chatbase.co";document.body.appendChild(script)};if(document.readyState==="complete"){onLoad()}else{window.addEventListener("load",onLoad)}})();
    </script>
    {% endif %}
</body>
</html>
